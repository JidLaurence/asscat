<!-- <script defer src="/socket.io/socket.io.js"></script> -->

<script src="/socket.io/socket.io.js"></script>
<script defer src="/assets/socket/index.js"></script>

{{> user-leftnav dashboard-open=true}}
<main
  class="main-content position-relative max-height-vh-100 h-100 border-radius-lg"
>
  {{> user-topnav }}
  <span id="userFullname" hidden
    >{{credentials.firstName}} {{credentials.lastName}}</span
  >
  <div class="container-fluid">
    <div class="row">
      <div class="col-xl-8 py-3">
        <div class="card">
          <div class="card-body p-3" style="min-height: 80vh">
            <h1 class="title">Delta Meet</h1>
            <p id="notification" hidden></p>
            <div class="entry-modal" id="entry-modal">
              <p>Create or Join Meeting</p>
              <input
                id="room-input"
                class="room-input"
                placeholder="Enter Room ID"
              />
              <div>
                <button onclick="createRoom()">Create Room</button>
                <button onclick="joinRoom()">Join Room</button>
              </div>
            </div>
            <div class="meet-area">
              <!-- Remote Video Element-->
              <video id="remote-video"></video>
              <!-- Local Video Element-->
              <video id="local-video"></video>
              <div class="meet-controls-bar">
                <button onclick="startScreenShare()">Screen Share</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-xl-4 py-3">
        <div class="card">
          <div class="card-body">
            <main class="content">
              <div class="container p-0">
                <h5 class="mb-3">Messages</h5>
                <div class="card">
                  <div class="row">
                    <div class="col-sm-12">
                      <div class="position-relative">
                        <div
                          class="chat-messages p-4"
                          id="message-container"
                        ></div>
                      </div>

                      <div class="flex-grow-0 py-3 px-4 border-top">
                        <form id="send-container">
                          <div class="input-group">
                            <input
                              type="text"
                              class="form-control"
                              placeholder="Type your message"
                              id="message-input"
                            />
                            <button
                              class="btn btn-primary py-4"
                              id="send-button"
                            >
                              Send
                            </button>
                          </div>
                        </form>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </main>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<style type="text/css">
  body {
    margin-top: 20px;
  }

  .chat-online {
    color: #34ce57;
  }

  .chat-offline {
    color: #e4606d;
  }

  .chat-messages {
    display: flex;
    flex-direction: column;
    max-height: 60vh;
    overflow-y: scroll;
    font-size: 12px;
  }

  .chat-message-left,
  .chat-message-right {
    display: flex;
    flex-shrink: 0;
  }

  .chat-message-left {
    margin-right: auto;
  }

  .chat-message-right {
    flex-direction: row-reverse;
    margin-left: auto;
  }
  .py-3 {
    padding-top: 1rem !important;
    padding-bottom: 1rem !important;
  }
  .px-4 {
    padding-right: 1.5rem !important;
    padding-left: 1.5rem !important;
  }
  .flex-grow-0 {
    flex-grow: 0 !important;
  }
  .border-top {
    border-top: 1px solid #dee2e6 !important;
  }
</style>

<script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
<script src="/assets/peerjs/index.js"></script>
